<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sorties fin mai</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      color-scheme: light;
      --ink: #17201c;
      --muted: #5a655f;
      --line: #dce4df;
      --paper: #fbfcfa;
      --soft: #eef5f0;
      --mint: #0b7a6b;
      --mint-soft: #d9f0e9;
      --coral: #c84e3f;
      --coral-soft: #f7ded8;
      --violet: #5d5abf;
      --violet-soft: #e8e7fb;
      --amber: #9d6a17;
      --amber-soft: #f4ead4;
      --shadow: 0 18px 50px rgba(31, 43, 35, 0.13);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: linear-gradient(180deg, #f8fbf8 0%, #ffffff 48%, #f3f8f6 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input {
      font: inherit;
    }

    .icon {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      stroke-width: 2;
    }

    .hero {
      position: relative;
      overflow: hidden;
      color: white;
      background:
        linear-gradient(90deg, rgba(6, 36, 31, 0.92) 0%, rgba(11, 58, 50, 0.76) 48%, rgba(18, 84, 77, 0.28) 100%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.2)),
        url("https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Aigues-Mortes_-_View_from_the_ramparts_-_03.jpg/1200px-Aigues-Mortes_-_View_from_the_ramparts_-_03.jpg") center 45% / cover;
    }

    .hero-inner,
    main {
      width: min(1160px, calc(100% - 32px));
      margin: 0 auto;
    }

    .hero-inner {
      padding: 30px 0 34px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 38px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 850;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(255, 255, 255, 0.48);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(12px);
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .ghost-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.42);
      background: rgba(255, 255, 255, 0.14);
      color: white;
      backdrop-filter: blur(12px);
    }

    .hero-copy {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(290px, 410px);
      gap: 32px;
      align-items: end;
    }

    h1 {
      margin: 0;
      max-width: 820px;
      font-size: clamp(2.45rem, 5.7vw, 5.5rem);
      line-height: 0.96;
      letter-spacing: 0;
    }

    .lede {
      max-width: 720px;
      margin: 20px 0 0;
      color: rgba(255, 255, 255, 0.9);
      font-size: 1.08rem;
      line-height: 1.65;
    }

    .choice-panel {
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: var(--radius);
      background: rgba(8, 29, 26, 0.58);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      padding: 16px;
    }

    .choice-panel h2,
    .section-title h2 {
      margin: 0;
      font-size: 1.05rem;
    }

    .quick-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .stat {
      min-height: 78px;
      padding: 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.16);
    }

    .stat strong {
      display: block;
      font-size: 1.35rem;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 8px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 0.86rem;
      line-height: 1.35;
    }

    main {
      padding: 26px 0 20px;
    }

    .simple-title {
      margin: 0 0 18px;
      padding: 4px 0 0;
      text-align: center;
    }

    .simple-title h1 {
      margin: 0;
      max-width: none;
      color: var(--ink);
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.05;
    }

    .toolbar {
      display: none;
      position: sticky;
      top: 0;
      z-index: 20;
      margin: 0 -16px 26px;
      padding: 12px 16px;
      background: rgba(248, 251, 248, 0.94);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(220, 227, 223, 0.9);
    }

    #aide-choix {
      display: none;
    }

    .toolbar-inner {
      width: min(1160px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(210px, 300px) 1fr;
      gap: 12px;
      align-items: center;
    }

    .search {
      position: relative;
    }

    .search svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search input {
      width: 100%;
      min-height: 42px;
      border-radius: 8px;
      border: 1px solid var(--line);
      padding: 9px 12px 9px 42px;
      background: white;
      color: var(--ink);
      outline: none;
    }

    .search input:focus {
      border-color: var(--mint);
      box-shadow: 0 0 0 3px rgba(11, 122, 107, 0.13);
    }

    .filters {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: thin;
    }

    .filter-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 42px;
      white-space: nowrap;
      border: 1px solid var(--line);
      background: white;
      color: var(--ink);
      border-radius: 8px;
      padding: 9px 12px;
      cursor: pointer;
    }

    .filter-btn[aria-pressed="true"] {
      border-color: transparent;
      color: white;
      background: var(--mint);
    }

    .section {
      margin: 26px 0 34px;
    }

    .section-title {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .section-title p {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .count {
      color: var(--muted);
      font-size: 0.93rem;
      white-space: nowrap;
    }

    .chooser {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .chooser-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      padding: 14px;
      min-height: 146px;
      box-shadow: 0 10px 26px rgba(31, 43, 35, 0.06);
    }

    .chooser-card strong {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 0.98rem;
    }

    .chooser-card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.93rem;
      line-height: 1.45;
    }

    .selected-box {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 16px 0 0;
      border: 1px solid rgba(11, 122, 107, 0.18);
      border-radius: 8px;
      background: var(--mint-soft);
      padding: 14px;
    }

    .selected-box.visible {
      display: flex;
    }

    .selected-box strong {
      display: block;
      margin-bottom: 3px;
    }

    .selected-box p {
      margin: 0;
      color: #214139;
    }

    .cards {
      display: grid;
      gap: 18px;
    }

    .outing {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      align-items: start;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: white;
      box-shadow: 0 12px 34px rgba(31, 43, 35, 0.08);
    }

    .outing.selected {
      border-color: rgba(11, 122, 107, 0.48);
      box-shadow: 0 0 0 3px rgba(11, 122, 107, 0.12), 0 18px 42px rgba(31, 43, 35, 0.12);
    }

    .outing-media {
      position: relative;
      min-height: 430px;
      height: 430px;
      background: var(--soft);
    }

    .outing-left {
      min-width: 0;
      background: var(--paper);
      border-right: 1px solid var(--line);
    }

    .route-preview {
      padding: 12px;
      border-top: 1px solid var(--line);
      background: #f7faf8;
    }

    .route-preview h4 {
      display: flex;
      align-items: center;
      gap: 7px;
      margin: 0 0 9px;
      color: var(--muted);
      font-size: 0.84rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .route-frame {
      width: 100%;
      height: 250px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #dcebf7;
    }

    .route-map {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .route-fallback {
      position: absolute;
      inset: 0;
      z-index: 500;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      align-items: center;
      gap: 14px;
      padding: 18px;
      color: #315063;
      text-align: center;
      background: linear-gradient(135deg, #dceefc, #eef8f0);
      font-weight: 750;
      line-height: 1.35;
    }

    .route-fallback::before {
      content: "";
      position: absolute;
      left: 24%;
      right: 24%;
      top: 46%;
      border-top: 4px solid rgba(200, 78, 63, 0.78);
      transform: rotate(-8deg);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.65);
    }

    .route-point {
      position: relative;
      z-index: 1;
      justify-self: center;
      max-width: 130px;
      padding: 7px 9px;
      border-radius: 8px;
      background: white;
      border: 1px solid rgba(49, 80, 99, 0.18);
      box-shadow: 0 8px 22px rgba(49, 80, 99, 0.12);
      font-size: 0.78rem;
    }

    .route-point::before {
      content: "";
      display: block;
      width: 10px;
      height: 10px;
      margin: 0 auto 4px;
      border-radius: 50%;
      background: var(--coral);
    }

    .route-start::before {
      background: var(--mint);
    }

    .route-note {
      position: relative;
      z-index: 1;
      grid-column: 1 / -1;
      justify-self: center;
      padding: 6px 9px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.82);
      color: #315063;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .route-map.loaded .route-fallback {
      display: none;
    }

    .leaflet-container {
      font: inherit;
    }

    .leaflet-control-attribution {
      font-size: 9px;
    }

    .route-caption {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.35;
    }

    .photo-fallback {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: white;
      text-align: center;
      background:
        linear-gradient(135deg, rgba(11, 122, 107, 0.92), rgba(93, 90, 191, 0.74)),
        radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.28), transparent 32%);
    }

    .photo-fallback strong {
      display: block;
      max-width: 240px;
      font-size: clamp(1.35rem, 3vw, 2.2rem);
      line-height: 1.05;
    }

    .outing-media img {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      min-height: 0;
      object-fit: cover;
      display: block;
    }

    .outing-media img.failed {
      opacity: 0;
    }

    .rank {
      position: absolute;
      z-index: 2;
      top: 14px;
      left: 14px;
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 8px;
      color: white;
      font-weight: 900;
      background: rgba(16, 26, 22, 0.76);
      border: 1px solid rgba(255, 255, 255, 0.38);
      backdrop-filter: blur(8px);
    }

    .photo-label {
      position: absolute;
      z-index: 2;
      right: 12px;
      bottom: 12px;
      max-width: calc(100% - 24px);
      padding: 7px 9px;
      border-radius: 8px;
      color: white;
      background: rgba(16, 26, 22, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.22);
      font-size: 0.82rem;
      backdrop-filter: blur(8px);
    }

    .outing-body {
      padding: 18px;
    }

    .outing-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: start;
      margin-bottom: 12px;
    }

    .outing h3 {
      margin: 0;
      font-size: clamp(1.32rem, 2.3vw, 1.9rem);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .title-line {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .outing-emoji {
      display: inline-grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: var(--mint-soft);
      border: 1px solid rgba(11, 122, 107, 0.18);
      font-size: 1.45rem;
      flex: 0 0 auto;
    }

    .pitch {
      margin: 8px 0 0;
      color: var(--ink);
      font-size: 1.02rem;
      line-height: 1.55;
      font-weight: 640;
    }

    .subtitle {
      margin: 7px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 14px 0;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 31px;
      padding: 5px 9px;
      border-radius: 8px;
      font-size: 0.86rem;
      line-height: 1.2;
      color: #214139;
      background: var(--mint-soft);
      border: 1px solid rgba(11, 122, 107, 0.16);
    }

    .pill.event {
      color: #6f281f;
      background: var(--coral-soft);
      border-color: rgba(200, 78, 63, 0.18);
    }

    .pill.culture {
      color: #39347f;
      background: var(--violet-soft);
      border-color: rgba(93, 90, 191, 0.18);
    }

    .decision-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 16px 0;
    }

    .decision {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: var(--paper);
      min-width: 0;
    }

    .decision h4 {
      display: flex;
      align-items: center;
      gap: 7px;
      margin: 0 0 7px;
      font-size: 0.84rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .decision p {
      margin: 0;
      color: var(--ink);
      line-height: 1.42;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .per-person {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
    }

    .decision small {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      line-height: 1.38;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin: 16px 0 0;
    }

    .block {
      border-top: 1px solid var(--line);
      padding-top: 12px;
      min-width: 0;
    }

    .block h4 {
      display: flex;
      align-items: center;
      gap: 7px;
      margin: 0 0 8px;
      font-size: 0.9rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .block p,
    .block ul,
    .block ol {
      margin: 0;
      color: var(--ink);
      line-height: 1.53;
      font-size: 0.95rem;
    }

    .block ul,
    .block ol {
      padding-left: 18px;
    }

    .block li + li {
      margin-top: 5px;
    }

    .empty {
      display: none;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background: white;
      padding: 22px;
      color: var(--muted);
    }

    .empty.visible {
      display: block;
    }

    @media (max-width: 1040px) {
      .decision-grid,
      .chooser {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 940px) {
      .toolbar-inner,
      .outing {
        grid-template-columns: 1fr;
      }

      .outing-media img {
        height: 310px;
        min-height: 310px;
      }

      .outing-media {
        height: 310px;
        min-height: 310px;
      }

      .outing-left {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .route-frame {
        height: 230px;
      }
    }

    @media (max-width: 820px) {
      .hero-copy {
        grid-template-columns: 1fr;
      }

      .choice-panel {
        max-width: 520px;
      }
    }

    @media (max-width: 640px) {
      .hero-inner,
      main {
        width: min(100% - 24px, 1160px);
      }

      .hero-inner {
        padding-top: 18px;
      }

      .topbar {
        display: grid;
        gap: 14px;
        margin-bottom: 30px;
      }

      .top-actions {
        justify-content: start;
      }

      .toolbar {
        margin-left: -12px;
        margin-right: -12px;
        padding-left: 12px;
        padding-right: 12px;
      }

      .quick-stats,
      .decision-grid,
      .chooser,
      .info-grid {
        grid-template-columns: 1fr;
      }

      .selected-box {
        display: none;
      }

      .selected-box.visible {
        display: grid;
      }

      .outing-body {
        padding: 15px;
      }

      .outing-head {
        grid-template-columns: 1fr;
      }
    }

    @media print {
      .toolbar,
      .top-actions {
        display: none;
      }

      body {
        background: white;
      }

      .hero {
        color: var(--ink);
        background: white;
        border-bottom: 1px solid var(--line);
      }

      .choice-panel,
      .stat {
        color: var(--ink);
        background: white;
        border-color: var(--line);
        box-shadow: none;
      }

      .stat span,
      .lede {
        color: var(--muted);
      }

      .outing {
        break-inside: avoid;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="simple-title">
      <h1>Sorties fin mai</h1>
    </section>

    <section class="section" id="propositions">
      <div class="section-title">
        <div>
          <h2>Les 10 sorties à choisir</h2>
          <p>Une fiche par sortie, avec photo, budget par personne, activités, itinéraire et aperçu du trajet sans péage.</p>
        </div>
        <span class="count" id="resultCount"></span>
      </div>
      <div class="empty" id="emptyState">Aucune proposition ne correspond à cette recherche.</div>
      <div class="cards" id="cards"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const outings = [
      {
        id: "saint-guilhem",
        rank: 1,
        emoji: "🛶",
        title: "Saint-Guilhem + canoë + Grotte de Clamouse",
        vibe: "La journée eau turquoise, village médiéval et fraîcheur souterraine.",
        subtitle: "Gorges de l’Hérault, Pont du Diable, ruelles de Saint-Guilhem et grotte spectaculaire.",
        image: "https://commons.wikimedia.org/wiki/Special:FilePath/Saint-Guilhem-le-D%C3%A9sert%20(H%C3%A9rault%2C%20Fr)%20gorge%20de%20l%27H%C3%A9rault.JPG?width=900",
        imageLabel: "Saint-Guilhem-le-Désert",
        tags: ["nature", "activite", "patrimoine", "spectacle"],
        badges: ["Nature / eau", "Activité", "Village"],
        drive: "45 min",
        budget: "45-60 €",
        budgetDetail: "Canoë 16-26 € + Clamouse 14-16 € + repas simple 15-20 €.",
        effort: "Modéré",
        duration: "Journée complète",
        bestMoment: "Canoë le matin, village et grotte l’après-midi.",
        reservation: "Réserver le canoë et la Grotte de Clamouse.",
        whyChoose: "À choisir si tu veux une vraie journée de vacances sans partir loin : de l’eau, des falaises, un village magnifique et une grotte pour finir au frais.",
        activities: [
          "Descente en canoë ou kayak dans les gorges de l’Hérault.",
          "Balade dans Saint-Guilhem-le-Désert et passage par l’abbaye.",
          "Visite guidée de la Grotte de Clamouse.",
          "Pause au Pont du Diable ou terrasse dans le village."

        check: '<path d="M20 6 9 17l-5-5"/>',
        search: '<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>',
        filter: '<path d="M22 3H2l8 9.5V20l4 2v-9.5Z"/>',
        wallet: '<path d="M20 12V8a2 2 0 0 0-2-2H5a3 3 0 0 1 0-6h12v4"/><path d="M4 6h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V3"/><path d="M18 12h.01"/>',
        spark: '<path d="m12 3-1.9 5.8L4 11l6.1 2.2L12 19l1.9-5.8L20 11l-6.1-2.2Z"/>'
      };
      return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">${paths[name]}</svg>`;
    }

    function categoryClass(label) {
      if (label.includes("Événement")) return "event";
      if (label.includes("Patrimoine") || label.includes("Village") || label.includes("Culture") || label.includes("Immersif")) return "culture";
      return "";
    }

    function routeDestination(outing) {
      const route = routePreviews[outing.id];
      return route ? route.label : outing.title;
    }

    function routeData(outing) {
      return routePreviews[outing.id] || {
        label: outing.title,
        points: [montpellier, montpellier]
      };
    }

    function initRouteMaps() {
      const mapNodes = document.querySelectorAll(".route-map");
      if (!window.L) {
        mapNodes.forEach(node => node.classList.add("fallback-only"));
        return;
      }

      mapNodes.forEach(node => {
        if (node.dataset.mapReady === "true") return;
        const outing = outings.find(item => item.id === node.dataset.routeId);
        if (!outing) return;

        const route = routeData(outing);
        const map = L.map(node, {
          zoomControl: false,
          dragging: false,
          scrollWheelZoom: false,
          doubleClickZoom: false,
          boxZoom: false,
          keyboard: false,
          tap: false
        });

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 18,
          attribution: "&copy; OpenStreetMap"
        }).addTo(map);

        const line = L.polyline(route.points, {
          color: "#c84e3f",
          weight: 4,
          opacity: 0.9
        }).addTo(map);

        L.circleMarker(route.points[0], {
          radius: 5,
          color: "#0b7a6b",
          fillColor: "#0b7a6b",
          fillOpacity: 1
        }).addTo(map).bindTooltip("Montpellier", { permanent: true, direction: "top" });

        L.circleMarker(route.points[route.points.length - 1], {
          radius: 5,
          color: "#c84e3f",
          fillColor: "#c84e3f",
          fillOpacity: 1
        }).addTo(map).bindTooltip(route.label, { permanent: true, direction: "top" });

        map.fitBounds(line.getBounds(), { padding: [26, 26], maxZoom: 10 });
        node.dataset.mapReady = "true";
        node.classList.add("loaded");
        setTimeout(() => map.invalidateSize(), 0);
      });
    }

    function renderCards() {
      const visible = outings;
      resultCount.textContent = `${visible.length} / ${outings.length} propositions`;
      emptyState.classList.toggle("visible", visible.length === 0);

      cards.innerHTML = visible.map(outing => {
        const route = routeData(outing);
        return `
          <article class="outing" id="${outing.id}">
            <div class="outing-left">
              <div class="outing-media">
                <img src="${outing.image}" alt="${outing.imageLabel}" loading="lazy" onerror="this.classList.add('failed')">
                <div class="photo-fallback" aria-hidden="true"><strong>${outing.imageLabel}</strong></div>
                <span class="rank">${outing.rank}</span>
                <span class="photo-label">${outing.imageLabel}</span>
              </div>
              <div class="route-preview">
                <h4>${icon("route")} Trajet voiture sans péage</h4>
                <div class="route-frame">
                  <div class="route-map" data-route-id="${outing.id}" aria-label="Aperçu du trajet voiture sans péage depuis Montpellier vers ${routeDestination(outing)}">
                    <div class="route-fallback" aria-hidden="true">
                      <span class="route-point route-start">Montpellier</span>
                      <span class="route-point route-end">${route.label}</span>
                      <span class="route-note">${outing.drive} · voiture · sans péage</span>
                    </div>
                  </div>
                </div>
                <p class="route-caption">${outing.drive} environ en voiture, sans péage, depuis Montpellier.</p>
              </div>
            </div>
            <div class="outing-body">
              <div class="outing-head">
                <div>
                  <div class="title-line"><span class="outing-emoji" aria-hidden="true">${outing.emoji}</span><h3>${outing.title}</h3></div>
                  <p class="pitch">${outing.vibe}</p>
                  <p class="subtitle">${outing.subtitle}</p>
                </div>
              </div>

              <div class="meta">
                ${outing.badges.map(badge => `<span class="pill ${categoryClass(badge)}">${badge}</span>`).join("")}
              </div>

              <div class="decision-grid">
                <div class="decision">
                  <h4>${icon("route")} Trajet</h4>
                  <p>${outing.drive}</p>
                  <small>Voiture sans péage depuis Montpellier</small>
                </div>
                <div class="decision">
                  <h4>${icon("wallet")} Budget</h4>
                  <p>${outing.budget}<span class="per-person">par personne</span></p>
                  <small>${outing.budgetDetail}</small>
                </div>
                <div class="decision">
                  <h4>${icon("spark")} Effort</h4>
                  <p>${outing.effort}</p>
                  <small>${outing.duration}</small>
                </div>
                <div class="decision">
                  <h4>${icon("calendar")} Moment</h4>
                  <p>${outing.bestMoment}</p>
                  <small>Moment conseillé pour profiter de la sortie</small>
                </div>
              </div>

              <div class="info-grid">
                <div class="block">
                  <h4>${icon("spark")} Activités sur place</h4>
                  <ul>${outing.activities.map(activity => `<li>${activity}</li>`).join("")}</ul>
                </div>
                <div class="block">
                  <h4>${icon("clock")} Itinéraire simple</h4>
                  <ol>${outing.itinerary.map(step => `<li>${step}</li>`).join("")}</ol>
                </div>
              </div>
            </div>
          </article>
        `;
      }).join("");
      initRouteMaps();
    }

    renderCards();

    cards.addEventListener("error", event => {
      if (event.target.matches("img")) {
        event.target.classList.add("failed");
      }
    }, true);
  </script>
</body>
</html>
